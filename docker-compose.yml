services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: voiceagent
      POSTGRES_USER: voiceagent
      POSTGRES_PASSWORD: voiceagent_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/VoiceAgent.WebAPI/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Database=voiceagent;Username=voiceagent;Password=voiceagent_dev

  worker:
    build:
      context: .
      dockerfile: src/VoiceAgent.WorkerService/Dockerfile
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Database=voiceagent;Username=voiceagent;Password=voiceagent_dev

volumes:
  postgres_data:
