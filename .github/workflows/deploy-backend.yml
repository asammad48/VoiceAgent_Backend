name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy-backend.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish src/VoiceAgent.Api \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o ./publish/api

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: './publish/api/*'
          target: '/var/www/voiceagent/api'
          strip_components: 2

      - name: Restart API service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            sudo systemctl restart voiceagent-api
            sleep 3
            sudo systemctl is-active --quiet voiceagent-api && echo "Service started OK" || (sudo journalctl -u voiceagent-api -n 30 --no-pager && exit 1)
